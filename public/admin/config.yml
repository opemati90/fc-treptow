# Decap CMS Konfiguration für den FC Treptow
# Lokal testen:  npx decap-server  (in einem zweiten Terminal) + local_backend: true
# Produktion (Netlify): backend auf git-gateway umstellen und Netlify Identity aktivieren.
backend:
  name: git-gateway
  branch: main

local_backend: true

locale: de
site_url: https://www.fc-treptow.de
logo_url: /images/crest.jpg

media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: news
    label: News
    label_singular: News-Beitrag
    folder: src/content/news
    create: true
    slug: "{{slug}}"
    sort_by: [date]
    fields:
      - { name: title, label: Titel, widget: string }
      - { name: date, label: Datum, widget: datetime }
      - { name: tag, label: Rubrik, widget: select, options: [Verein, Herren I, Herren II, Herren III, Freizeit, Goldenes Ticket], default: Verein }
      - { name: teaser, label: Kurztext, widget: text, hint: "1 bis 2 Sätze, erscheint in der Übersicht." }
      - { name: image, label: Bild, widget: image, required: false }
      - { name: body, label: Text, widget: markdown }

  - name: teams
    label: Mannschaften
    label_singular: Mannschaft
    folder: src/content/teams
    create: true
    slug: "{{slug}}"
    fields:
      - { name: name, label: Name, widget: string }
      - { name: shortName, label: Kurzname, widget: string, hint: "z. B. Herren I" }
      - { name: league, label: Liga, widget: string }
      - { name: order, label: Reihenfolge, widget: number, value_type: int }
      - { name: training, label: Trainingszeiten, widget: list, field: { name: zeit, label: Zeit, widget: string } }
      - { name: ground, label: Platz, widget: string, default: "Willi-Sänger-Sportanlage, Köpenicker Landstraße 186, 12437 Berlin" }
      - { name: contact, label: Kontakt-E-Mail, widget: string, default: kontakt@fc-treptow.de }
      - { name: image, label: Teamfoto, widget: image }
      - { name: imageFocus, label: Bildausschnitt Kopfbild, widget: number, value_type: int, default: 50, min: 0, max: 100, hint: "Nur nötig, wenn auf dem Kopfbild jemand angeschnitten wird. 50 = Bildmitte, kleinere Werte zeigen mehr vom oberen Bildrand, größere mehr vom unteren." }
      - name: gallery
        label: Spieltagsfotos
        widget: list
        required: false
        fields:
          - { name: src, label: Bild, widget: image }
          - { name: alt, label: Bildunterschrift, widget: string }
      - name: table
        label: Tabelle (Ausschnitt)
        widget: list
        required: false
        hint: "Kurzer Tabellenausschnitt. Die eigene Mannschaft mit 'Unser Team' markieren."
        fields:
          - { name: pos, label: Platz, widget: number, value_type: int }
          - { name: team, label: Team, widget: string }
          - { name: games, label: Spiele, widget: number, value_type: int }
          - { name: diff, label: Tordifferenz, widget: string }
          - { name: points, label: Punkte, widget: number, value_type: int }
          - { name: us, label: Unser Team, widget: boolean, default: false, required: false }
      - name: results
        label: Letzte Spiele
        widget: list
        required: false
        fields:
          - { name: date, label: Datum, widget: string, hint: "z. B. So, 12.07." }
          - { name: home, label: Heim, widget: string }
          - { name: away, label: Gast, widget: string }
          - { name: score, label: Ergebnis, widget: string, hint: "z. B. 3:1" }
          - { name: note, label: Notiz, widget: string, required: false }
      - { name: body, label: Teambeschreibung, widget: markdown }

  - name: sponsors
    label: Sponsoren
    label_singular: Sponsor
    folder: src/content/sponsors
    create: true
    slug: "{{slug}}"
    fields:
      - { name: name, label: Name, widget: string }
      - { name: logo, label: Logo, widget: image, required: false, hint: "Ohne Logo wird automatisch ein Monogramm angezeigt." }
      - { name: url, label: Webseite, widget: string, required: false }
      - { name: tier, label: Kategorie, widget: select, options: [Hauptsponsor, Partner], default: Partner }
      - { name: order, label: Reihenfolge, widget: number, value_type: int, default: 99 }
      - { name: body, label: Notizen (intern), widget: markdown, required: false }
